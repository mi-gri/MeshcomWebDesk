name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows x64 (framework-dependent)
        run: |
          dotnet publish MeshcomWebDesk/MeshcomWebDesk.csproj \
            -c Release \
            -r win-x64 \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -o ./publish/win-x64

      - name: Publish Linux x64 (framework-dependent)
        run: |
          dotnet publish MeshcomWebDesk/MeshcomWebDesk.csproj \
            -c Release \
            -r linux-x64 \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -o ./publish/linux-x64

      - name: Publish macOS x64 / Intel (framework-dependent)
        run: |
          dotnet publish MeshcomWebDesk/MeshcomWebDesk.csproj \
            -c Release \
            -r osx-x64 \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -o ./publish/osx-x64

      - name: Publish macOS arm64 / Apple Silicon (framework-dependent)
        run: |
          dotnet publish MeshcomWebDesk/MeshcomWebDesk.csproj \
            -c Release \
            -r osx-arm64 \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -o ./publish/osx-arm64

      - name: Publish Linux arm64 / Raspberry Pi 4+5 (framework-dependent)
        run: |
          dotnet publish MeshcomWebDesk/MeshcomWebDesk.csproj \
            -c Release \
            -r linux-arm64 \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -o ./publish/linux-arm64

      - name: Package Windows ZIP
        run: |
          cp deploy/appsettings.template.json publish/win-x64/appsettings.json
          cd publish/win-x64
          zip -r ../../MeshcomWebDesk-${{ github.ref_name }}-win-x64.zip .

      - name: Package Linux tarball
        run: |
          cp deploy/appsettings.template.json publish/linux-x64/appsettings.json
          cp deploy/install.sh publish/linux-x64/
          cp deploy/meshcom-webdesk.service publish/linux-x64/
          chmod +x publish/linux-x64/MeshcomWebDesk
          chmod +x publish/linux-x64/install.sh
          tar -czf MeshcomWebDesk-${{ github.ref_name }}-linux-x64.tar.gz \
            -C publish/linux-x64 .

      - name: Package macOS x64 tarball
        run: |
          cp deploy/appsettings.template.json publish/osx-x64/appsettings.json
          chmod +x publish/osx-x64/MeshcomWebDesk
          tar -czf MeshcomWebDesk-${{ github.ref_name }}-osx-x64.tar.gz \
            -C publish/osx-x64 .

      - name: Package macOS arm64 tarball
        run: |
          cp deploy/appsettings.template.json publish/osx-arm64/appsettings.json
          chmod +x publish/osx-arm64/MeshcomWebDesk
          tar -czf MeshcomWebDesk-${{ github.ref_name }}-osx-arm64.tar.gz \
            -C publish/osx-arm64 .

      - name: Package Linux arm64 tarball (Raspberry Pi 4+5)
        run: |
          cp deploy/appsettings.template.json publish/linux-arm64/appsettings.json
          cp deploy/install.sh publish/linux-arm64/
          cp deploy/meshcom-webdesk.service publish/linux-arm64/
          chmod +x publish/linux-arm64/MeshcomWebDesk
          chmod +x publish/linux-arm64/install.sh
          tar -czf MeshcomWebDesk-${{ github.ref_name }}-linux-arm64.tar.gz \
            -C publish/linux-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MeshcomWebDesk-${{ github.ref_name }}-win-x64.zip
            MeshcomWebDesk-${{ github.ref_name }}-linux-x64.tar.gz
            MeshcomWebDesk-${{ github.ref_name }}-linux-arm64.tar.gz
            MeshcomWebDesk-${{ github.ref_name }}-osx-x64.tar.gz
            MeshcomWebDesk-${{ github.ref_name }}-osx-arm64.tar.gz
          generate_release_notes: true

  windows-installer:
    name: Windows Installer
    runs-on: windows-latest
    needs: release   # wait until the release exists before uploading to it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained win-x64
        shell: pwsh
        run: |
          dotnet publish MeshcomWebDesk/MeshcomWebDesk.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0 `
            -p:FileVersion=${{ steps.version.outputs.VERSION }}.0 `
            --output installer/publish/win-x64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.VERSION }} installer\MeshcomWebDesk.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/MeshcomWebDesk-Setup-${{ steps.version.outputs.VERSION }}-win-x64.exe
